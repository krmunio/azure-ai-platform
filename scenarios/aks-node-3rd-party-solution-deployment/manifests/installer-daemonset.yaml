# 케이스 B: Installer-DaemonSet
# 모든 노드에서 install.sh(ConfigMap)를 호스트 컨텍스트로 실행해 OS 레벨 설치를 수행한다.
# 설치 파일(.deb/.tar)은 아래 image에 번들하는 것을 권장한다(폐쇄망/멱등성).
# 스크립트만 바꿀 때: kubectl rollout restart ds/solution-installer -n kube-system
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: solution-installer
  namespace: kube-system
  labels:
    name: solution-installer
spec:
  selector:
    matchLabels:
      name: solution-installer
  template:
    metadata:
      labels:
        name: solution-installer
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      # OS/아키텍처가 혼합된 노드풀이면 분리 배포
      # nodeSelector:
      #   kubernetes.io/os: linux
      #   kubernetes.azure.com/os-sku: Ubuntu
      containers:
        - name: installer
          # 설치 파일을 /staging에 번들한 사설 이미지로 교체:
          #   <acr>.azurecr.io/solution-installer:<tag>
          image: <acr>.azurecr.io/solution-installer:latest
          command: ["/bin/bash", "/scripts/install.sh"]
          env:
            - name: SERVICE_NAME
              value: "mysolution"
            - name: PKG_PATH
              value: "/staging/mysolution.deb"
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: install-script
              mountPath: /scripts
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: install-script
          configMap:
            name: solution-installer-script
            defaultMode: 0755
