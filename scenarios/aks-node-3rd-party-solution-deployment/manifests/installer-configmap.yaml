# 케이스 B: headless 호스트 설치 스크립트 (멱등)
# 바이너리(.deb/.tar)는 DaemonSet 이미지에 번들하고(권장), 이 스크립트가 설치 로직을 담당한다.
# 스크립트는 ConfigMap으로 주입되어 installer-daemonset.yaml에서 마운트/실행된다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: solution-installer-script
  namespace: kube-system
data:
  install.sh: |
    #!/bin/bash
    set -euo pipefail

    SERVICE_NAME="${SERVICE_NAME:-mysolution}"
    PKG_PATH="${PKG_PATH:-/staging/mysolution.deb}"   # 이미지에 번들된 패키지 경로
    HOST_ROOT="/host"

    echo "[installer] node=$(cat ${HOST_ROOT}/etc/hostname 2>/dev/null || echo unknown)"

    # 멱등성: 이미 설치되어 active면 설치를 건너뛴다 (재이미지/스케일아웃 시 중복 설치 방지)
    if chroot "${HOST_ROOT}" systemctl is-active --quiet "${SERVICE_NAME}.service"; then
      echo "[installer] ${SERVICE_NAME} already active — skip install"
    else
      # 1) 패키지를 호스트로 복사
      cp "${PKG_PATH}" "${HOST_ROOT}/tmp/$(basename "${PKG_PATH}")"

      # 2) headless(비대화형) 설치
      chroot "${HOST_ROOT}" /bin/bash -c "
        DEBIAN_FRONTEND=noninteractive dpkg -i /tmp/$(basename "${PKG_PATH}") \
          || apt-get install -f -y
      "

      # 3) systemd 등록/기동 및 검증
      chroot "${HOST_ROOT}" systemctl enable --now "${SERVICE_NAME}.service"
      chroot "${HOST_ROOT}" systemctl is-active --quiet "${SERVICE_NAME}.service"
      echo "[installer] ${SERVICE_NAME} installed and active"
    fi

    # 설치/검증 후 Pod 상주(빠른 재시작 루프 방지). 노드가 새로 뜨면 DaemonSet이
    # 새 Pod를 스케줄링하며 이 스크립트가 다시 멱등 실행된다.
    echo "[installer] done — sleeping"
    sleep infinity
