# 케이스 A: Helm Chart 기반 DaemonSet values 예시 (일반화)
# 벤더가 제공하는 차트의 values 구조에 맞춰 키 이름은 조정한다.
# 핵심: ACR 이미지 사용 + 노드 전체 적용(DaemonSet) + 호스트 접근 권한 + 중앙 콘솔 연결.

# DaemonSet으로 노드당 1 Pod 배포 (차트가 deployment/daemonset을 선택 가능하면 daemonset 선택)
kind: DaemonSet

image:
  # 폐쇄망: 사내 ACR로 push한 이미지를 사용
  repository: <acr>.azurecr.io/<vendor>/<agent>
  tag: "<version>"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: acr-pull-secret   # ACR 인증이 필요한 경우

# 노드 호스트 접근 권한 (솔루션 요구에 따라 최소 권한으로 조정)
securityContext:
  privileged: true
hostNetwork: true
hostPID: true

# 모든 노드(컨트롤/시스템 포함)에 배포하려면 모든 taint 허용
tolerations:
  - operator: Exists

# 혼합 노드풀이면 대상 한정
nodeSelector:
  kubernetes.io/os: linux

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# 중앙 관리 콘솔(Workload Management) 연결 설정 — 벤더 키에 맞게 치환
console:
  endpoint: "https://<central-console>:<port>"
  # 토큰/자격증명은 평문이 아닌 Secret 참조로 주입
  tokenSecretName: "<solution>-enroll-token"

# 자동 등록/워크로드 그룹 연결
enrollment:
  auto: true
  workloadGroup: "<group-name>"
