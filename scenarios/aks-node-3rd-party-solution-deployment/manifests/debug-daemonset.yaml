# 케이스 공통: privileged debug DaemonSet
# 모든 노드에 호스트 네임스페이스 접근이 가능한 Pod를 상주시켜 진단/수동 검증에 사용한다.
# 사용 후 반드시 삭제: kubectl delete -f debug-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-debug
  namespace: kube-system
  labels:
    app: node-debug
spec:
  selector:
    matchLabels:
      app: node-debug
  template:
    metadata:
      labels:
        app: node-debug
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists # 모든 taint 무시(컨트롤/시스템 노드 포함)
      containers:
        - name: debug
          image: ubuntu:22.04
          command: ["sleep", "infinity"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
# 진입 예시:
#   POD=$(kubectl -n kube-system get pod -l app=node-debug \
#     --field-selector spec.nodeName=<node> -o jsonpath='{.items[0].metadata.name}')
#   kubectl -n kube-system exec -it "$POD" -- nsenter -t 1 -m -u -i -n -p -- bash
#   # 또는: kubectl -n kube-system exec -it "$POD" -- chroot /host bash
