# Approach A: 파드에 2nd NIC(net1)를 부착하는 가장 단순·검증가능한 경로.
#
# master = eth0 (모든 AKS 노드에 기본 존재). 표준 AKS 관리형 노드풀은
# 노드에 보조 NIC(eth1)를 자동 제공하지 않으므로 eth0 위에 macvlan을 만든다.
#
# 무엇이 증명되나: 파드에 net1 인터페이스가 실제로 생성됨(Multus 동작 실증).
# 한계: 여기서 부여하는 IP는 Azure 패브릭 anti-spoofing 때문에 VNet에서
#       routable하지 않다. 즉 "2nd NIC 부착"은 증명되지만 "routable 2nd NIC"는 아니다
#       — 이것이 CN-Series/Approach B가 필요한 이유. DESIGN.md §6/§8.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-secondary
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "static",
        "addresses": [
          { "address": "192.168.100.10/24" }
        ]
      }
    }
