# Approach B (실험적/설계 참조 — 그대로 동작 보장 안 됨, 라이브 검증 필요):
# Azure CNI delegate로 전용 routable pod 서브넷(cn-pod-subnet)에서 IP 할당하여
# 2nd NIC가 Azure-인지 routable IP를 갖게 하는 것이 목표(요구사항 정합).
# 주의: 아래 azure-vnet delegate 설정은 표준 문서화된 turnkey 구성이 아니며,
#       Overlay primary + Azure CNI delegate 지원/형식은 배포 시점 검증 필요(DESIGN.md §8).
#       검증 전에는 Approach A(macvlan, master eth0)가 실제 테스트 가능한 경로다.
# <SUBNET_ID> 는 `terraform output -raw cn_pod_subnet_id` 값으로 치환.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: azure-routable-secondary
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "azure-vnet",
      "mode": "bridge",
      "ipam": {
        "type": "azure-vnet-ipam"
      },
      "subnet": "<SUBNET_ID>"
    }
