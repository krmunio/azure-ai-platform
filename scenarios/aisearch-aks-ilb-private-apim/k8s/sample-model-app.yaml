# 샘플 "모델 엔드포인트" 앱 — AKS 내부 LoadBalancer(ILB) 노출
#
# Terraform(infra/application)이 동일 워크로드를 kubernetes provider로 배포한다.
# 이 매니페스트는 kubectl 기반 배포/참조용 대안이다.
#
# 사용:
#   az aks get-credentials -g <rg명> -n <aks명>
#   kubectl apply -f k8s/sample-model-app.yaml
#   kubectl get svc model-endpoint-ilb -w   # EXTERNAL-IP = ILB 사설 IP
#
# loadBalancerIP는 AKS 노드 서브넷(snet-aks) 범위 내 값으로 맞춘다(기본 10.60.0.100).
# 실제 GPU 모델 서빙(Triton/torchserve/vLLM)으로 교체 시 image/포트/probe만 조정한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-endpoint-content
  labels:
    app: model-endpoint
data:
  index.json: |
    {"service":"model-endpoint","status":"ok","message":"mock inference response from AKS internal LB"}
  healthz: "healthy"
  default.conf: |
    server {
      listen 80;
      default_type application/json;
      location = /        { root /usr/share/nginx/html; try_files /index.json =404; }
      location = /healthz { default_type text/plain; root /usr/share/nginx/html; try_files /healthz =404; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-endpoint
  labels:
    app: model-endpoint
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-endpoint
  template:
    metadata:
      labels:
        app: model-endpoint
    spec:
      containers:
        - name: model-endpoint
          image: mcr.microsoft.com/oss/nginx/nginx:1.25.3
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: content
          configMap:
            name: model-endpoint-content
            items:
              - key: index.json
                path: index.json
              - key: healthz
                path: healthz
        - name: nginx-conf
          configMap:
            name: model-endpoint-content
            items:
              - key: default.conf
                path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: model-endpoint-ilb
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  loadBalancerIP: 10.60.0.100
  selector:
    app: model-endpoint
  ports:
    - port: 80
      targetPort: 80
